<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>MUYI CRM</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { margin:0; font-family:-apple-system; background:#f5f6fa; }

.wrap { display:flex; justify-content:center; align-items:center; height:100vh; }
.card {
  width:360px; background:white; border-radius:20px;
  padding:40px; box-shadow:0 20px 40px rgba(0,0,0,0.08);
}

input {
  width:100%; padding:14px; border-radius:12px;
  border:1px solid #ddd; margin-bottom:12px;
}

button {
  width:100%; padding:14px;
  border:none; border-radius:12px;
  background:#1e10c7; color:white;
  font-weight:bold; cursor:pointer;
}

#app { display:none; height:100vh; display:flex; }

.sidebar {
  width:240px; background:#1e10c7;
  color:white; padding:20px;
}

.menu {
  padding:12px; margin-top:10px;
  border-radius:10px; cursor:pointer;
}
.menu:hover { background:rgba(255,255,255,0.2); }

.main { flex:1; padding:30px; }

.section {
  background:white; border-radius:14px;
  padding:20px; margin-bottom:20px;
}

.dup { color:#ff8c00; font-weight:bold; }
.ok { color:#1e10c7; font-weight:bold; }

.list-item {
  padding:10px;
  border-bottom:1px solid #eee;
}
</style>
</head>

<body>

<div class="wrap" id="loginWrap">
  <div class="card">
    <h2>MUYI CRM</h2>
    <input id="email" placeholder="이메일">
    <input id="password" type="password" placeholder="비밀번호">
    <button id="loginBtn">로그인</button>
  </div>
</div>

<div id="app">

  <div class="sidebar">
    <h3>MUYI</h3>
    <div class="menu" onclick="showPage('crm')">CRM 등록</div>
    <div class="menu" onclick="showPage('call')">콜 기록</div>
  </div>

  <div class="main">

    <div id="crmPage">

      <div class="section">
        <h3>중복 가망 확인</h3>
        <input id="search" placeholder="전화번호 / 업체명">
        <button onclick="checkDuplicate()">검색</button>
        <p id="dupResult"></p>
        <div id="dupList"></div>
      </div>

      <div class="section">
        <h3>CRM 등록</h3>
        <input id="name" placeholder="업체명">
        <input id="phone" placeholder="010-0000-0000">
        <input id="address" placeholder="주소(지번)">
        <button onclick="save()">등록</button>
        <p id="msg"></p>
      </div>

    </div>

    <div id="callPage" style="display:none">
      <div class="section">
        <h3 id="todayText"></h3>
        <input id="call_count" placeholder="콜 수">
        <input id="call_time" placeholder="통화 시간">
        <button onclick="saveCall()">저장 / 수정</button>
        <p id="callMsg"></p>
      </div>
    </div>

  </div>

</div>

<script>

document.addEventListener("DOMContentLoaded", function () {

  const SUPABASE_URL = "https://npkpxlbcwmwlxqauevyv.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5wa3B4bGJjd213bHhxYXVldnl2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzMjg2MTIsImV4cCI6MjA4OTkwNDYxMn0.t3n2RvYdJd1_1Ay44V3MW7p2GqJDiocqgrmt0qIov88";

  if (!window.supabase) {
    alert("supabase 로딩 실패");
    return;
  }

  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let currentUser = null;

  function getToday(){
    return new Date().toISOString().slice(0,10);
  }

  document.getElementById("loginBtn").addEventListener("click", async function () {

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    if (!email || !password) {
      alert("이메일/비밀번호 입력");
      return;
    }

    try {
      const { data, error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) throw error;

      currentUser = data.user;

      document.getElementById("loginWrap").style.display = "none";
      document.getElementById("app").style.display = "flex";

      loadCall();

    } catch (e) {
      alert(e.message);
    }

  });

  window.showPage = function(page){
    document.getElementById("crmPage").style.display = page === 'crm' ? 'block' : 'none';
    document.getElementById("callPage").style.display = page === 'call' ? 'block' : 'none';
  }

  function mask(p){
    return p.replace(/(\d{3})-(\d{2})\d{2}-(\d{2})\d{2}/,"$1-$2**-$3**");
  }

  window.checkDuplicate = async function(){

    const keyword = document.getElementById("search").value;

    const { data } = await supabase
      .from("prospects")
      .select("*")
      .or(`phone.ilike.%${keyword}%,business_name.ilike.%${keyword}%`);

    const dupList = document.getElementById("dupList");
    const dupResult = document.getElementById("dupResult");

    dupList.innerHTML = "";

    if(data && data.length > 0){
      dupResult.innerHTML = "<span class='dup'>중복</span>";

      data.forEach(d=>{
        dupList.innerHTML += `
          <div class="list-item">
            ${d.business_name} / ${mask(d.phone)}
          </div>`;
      });

    } else {
      dupResult.innerHTML = "<span class='ok'>CRM 등록 가능</span>";
    }
  }

  /* ✅ 핵심 수정된 부분 */
  window.save = async function(){

    const name = document.getElementById("name").value.trim();
    const phone = document.getElementById("phone").value.trim();

    if(!name || !phone){
      alert("업체명 / 전화번호 입력");
      return;
    }

    const { data, error } = await supabase
      .from("prospects")
      .insert([{
        business_name: name,
        phone: phone,
        manager: currentUser.email || "unknown",
        memo: ""
      }]);

    if(error){
      console.error(error);
      document.getElementById("msg").innerText = error.message;
    } else {
      document.getElementById("msg").innerText = "저장 완료";
      document.getElementById("name").value = "";
      document.getElementById("phone").value = "";
    }
  }

  async function loadCall(){

    const today = getToday();
    document.getElementById("todayText").innerText = today;

    const { data } = await supabase
      .from("calls")
      .select("*")
      .eq("manager", currentUser.id)
      .eq("date", today);

    if(data && data.length > 0){
      document.getElementById("call_count").value = data[0].call_count;
      document.getElementById("call_time").value = data[0].call_time;
    }
  }

  window.saveCall = async function(){

    const today = getToday();

    const { data } = await supabase
      .from("calls")
      .select("*")
      .eq("manager", currentUser.id)
      .eq("date", today);

    if(data && data.length > 0){

      await supabase.from("calls")
        .update({
          call_count: document.getElementById("call_count").value,
          call_time: document.getElementById("call_time").value
        })
        .eq("id", data[0].id);

    } else {

      await supabase.from("calls").insert([{
        manager: currentUser.id,
        call_count: document.getElementById("call_count").value,
        call_time: document.getElementById("call_time").value,
        date: today
      }]);
    }

    document.getElementById("callMsg").innerText = "저장 완료";
  }

});
</script>

</body>
</html>
