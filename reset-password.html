<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>비밀번호 재설정 — MUYI CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{font-family:-apple-system,'Noto Sans KR',sans-serif;background:linear-gradient(145deg,#06057a 0%,#1a0fb8 45%,#2d1ee0 100%);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:24px;-webkit-font-smoothing:antialiased}
.card{width:100%;max-width:420px;background:rgba(255,255,255,.97);border-radius:28px;padding:44px 40px 40px;box-shadow:0 48px 96px rgba(0,0,0,.3);animation:cardIn .5s cubic-bezier(.34,1.56,.64,1) both}
@keyframes cardIn{from{opacity:0;transform:translateY(24px) scale(.96)}to{opacity:1;transform:none}}
.logo{text-align:center;margin-bottom:32px}
.logo-title{font-size:26px;font-weight:900;color:#1a0fb8;letter-spacing:-1px}
.logo-sub{font-size:12px;color:#8e8e93;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;margin-top:4px}
h1{font-size:20px;font-weight:800;color:#1c1c1e;margin-bottom:6px;letter-spacing:-.5px}
.desc{font-size:13px;color:#8e8e93;margin-bottom:28px;font-weight:500;line-height:1.6}
.form-group{margin-bottom:14px}
.lbl{display:block;font-size:11px;font-weight:700;color:#8e8e93;letter-spacing:.8px;text-transform:uppercase;margin-bottom:7px}
.fi{width:100%;padding:14px 16px;border:1.5px solid #e5e5ea;border-radius:10px;font-size:15px;font-family:inherit;outline:none;transition:all .2s;background:#f9f9fb;color:#1c1c1e}
.fi:focus{border-color:#0a84ff;box-shadow:0 0 0 4px rgba(10,132,255,.12);background:#fff}
.fi::placeholder{color:#aeaeb2}
.pw-wrap{position:relative}
.pw-wrap .fi{padding-right:44px}
.pw-toggle{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#8e8e93;font-size:16px;padding:4px;transition:color .15s}
.pw-toggle:hover{color:#3a3a3c}
.btn{width:100%;padding:15px;border:none;border-radius:10px;background:linear-gradient(135deg,#0a84ff,#0071e3);color:#fff;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;margin-top:6px}
.btn::after{content:'';position:absolute;inset:0;background:linear-gradient(rgba(255,255,255,.12),transparent);pointer-events:none}
.btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 8px 24px rgba(10,132,255,.35)}
.btn:disabled{opacity:.7;cursor:not-allowed;transform:none}
.spinner{display:inline-block;width:17px;height:17px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.msg{font-size:13px;font-weight:600;margin-top:12px;min-height:18px;text-align:center;line-height:1.5;padding:10px 14px;border-radius:10px;display:none}
.msg.show{display:block}
.msg.err{background:#fff1f2;color:#9f1239;border:1px solid #fecdd3}
.msg.ok{background:#f0fdf4;color:#166534;border:1px solid #bbf7d0}
.strength{height:4px;background:#e5e5ea;border-radius:4px;margin-top:8px;overflow:hidden}
.strength-bar{height:100%;border-radius:4px;transition:width .3s,background .3s}
.strength-lbl{font-size:11px;font-weight:600;margin-top:4px}
.success-box{text-align:center;display:none}
.success-box .icon{font-size:52px;margin-bottom:16px}
.success-box h2{font-size:20px;font-weight:800;color:#1c1c1e;margin-bottom:8px;letter-spacing:-.3px}
.success-box p{font-size:14px;color:#636366;margin-bottom:24px;line-height:1.6}
.btn-back{display:inline-flex;align-items:center;gap:8px;padding:13px 24px;background:linear-gradient(135deg,#0a84ff,#0071e3);color:#fff;font-size:15px;font-weight:700;border:none;border-radius:10px;cursor:pointer;font-family:inherit;text-decoration:none;transition:all .2s}
.btn-back:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(10,132,255,.35)}
.invalid-box{text-align:center;padding:8px 0}
.invalid-box .icon{font-size:48px;margin-bottom:16px}
.invalid-box h2{font-size:18px;font-weight:800;color:#1c1c1e;margin-bottom:8px}
.invalid-box p{font-size:13px;color:#636366;margin-bottom:20px;line-height:1.6}
@media(max-width:480px){.card{padding:32px 24px 28px;border-radius:22px}}
</style>
</head>
<body>

<div class="card" id="mainCard">
  <div class="logo">
    <div class="logo-title">MUYI CRM</div>
    <div class="logo-sub">Password Reset</div>
  </div>

  <!-- 유효하지 않은 링크 -->
  <div class="invalid-box" id="invalidBox" style="display:none">
    <div class="icon">🔗</div>
    <h2>링크가 유효하지 않습니다</h2>
    <p>비밀번호 재설정 링크가 만료되었거나<br>잘못된 링크입니다.</p>
    <a href="/" class="btn-back">로그인 페이지로</a>
  </div>

  <!-- 비밀번호 재설정 폼 -->
  <div id="resetForm">
    <h1>비밀번호 재설정</h1>
    <p class="desc">새 비밀번호를 입력해주세요.<br>최소 6자 이상이어야 합니다.</p>

    <div class="form-group">
      <label class="lbl" for="newPw">새 비밀번호</label>
      <div class="pw-wrap">
        <input class="fi" type="password" id="newPw" placeholder="새 비밀번호 입력 (6자 이상)" oninput="checkStrength(this.value)" autocomplete="new-password">
        <button class="pw-toggle" type="button" onclick="togglePw('newPw',this)" tabindex="-1">👁</button>
      </div>
      <div class="strength"><div class="strength-bar" id="strengthBar" style="width:0;background:#ef4444"></div></div>
      <div class="strength-lbl" id="strengthLbl" style="color:#aeaeb2"></div>
    </div>

    <div class="form-group">
      <label class="lbl" for="confirmPw">비밀번호 확인</label>
      <div class="pw-wrap">
        <input class="fi" type="password" id="confirmPw" placeholder="비밀번호 다시 입력" autocomplete="new-password" onkeydown="if(event.key==='Enter')doReset()">
        <button class="pw-toggle" type="button" onclick="togglePw('confirmPw',this)" tabindex="-1">👁</button>
      </div>
    </div>

    <div class="msg err" id="errMsg"></div>
    <div class="msg ok" id="okMsg"></div>

    <button class="btn" id="resetBtn" onclick="doReset()">
      <span id="resetBtnText">비밀번호 변경</span>
    </button>
  </div>

  <!-- 성공 화면 -->
  <div class="success-box" id="successBox">
    <div class="icon">✅</div>
    <h2>비밀번호가 변경되었습니다</h2>
    <p>새 비밀번호로 로그인하실 수 있습니다.</p>
    <a href="/" class="btn-back">로그인 페이지로</a>
  </div>
</div>

<script>
const SB_URL="https://npkpxlbcwmwlxqauevyv.supabase.co";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5wa3B4bGJjd213bHhxYXVldnl2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzMjg2MTIsImV4cCI6MjA4OTkwNDYxMn0.t3n2RvYdJd1_1Ay44V3MW7p2GqJDiocqgrmt0qIov88";
const sb=window.supabase.createClient(SB_URL,SB_KEY);

let _sessionReady=false;

// ── URL 토큰 처리 (Supabase v2 PKCE / 레거시 hash) ──
async function initResetPage(){
  const hash=window.location.hash;
  const params=new URLSearchParams(window.location.search);

  // 레거시: #access_token=...&type=recovery
  if(hash.includes('access_token')&&hash.includes('type=recovery')){
    const hp=new URLSearchParams(hash.replace('#',''));
    const access_token=hp.get('access_token');
    const refresh_token=hp.get('refresh_token');
    if(access_token){
      const{error}=await sb.auth.setSession({access_token,refresh_token:refresh_token||''});
      if(!error){_sessionReady=true;return;}
    }
    showInvalid();return;
  }

  // PKCE: ?code=... (최신 Supabase)
  const code=params.get('code');
  if(code){
    const{error}=await sb.auth.exchangeCodeForSession(code);
    if(!error){_sessionReady=true;return;}
    showInvalid();return;
  }

  // token_hash (OTP 방식)
  const tokenHash=params.get('token_hash');
  const type=params.get('type');
  if(tokenHash&&type==='recovery'){
    const{error}=await sb.auth.verifyOtp({token_hash:tokenHash,type:'recovery'});
    if(!error){_sessionReady=true;return;}
    showInvalid();return;
  }

  // 이미 세션이 있으면 (탭 유지 등)
  const{data}=await sb.auth.getSession();
  if(data?.session){_sessionReady=true;return;}

  showInvalid();
}

function showInvalid(){
  document.getElementById('resetForm').style.display='none';
  document.getElementById('invalidBox').style.display='block';
}

function togglePw(inputId,btn){
  const el=document.getElementById(inputId);
  const isText=el.type==='text';
  el.type=isText?'password':'text';
  btn.textContent=isText?'👁':'🙈';
}

function checkStrength(pw){
  const bar=document.getElementById('strengthBar');
  const lbl=document.getElementById('strengthLbl');
  if(!pw){bar.style.width='0';lbl.textContent='';lbl.style.color='#aeaeb2';return;}
  let score=0;
  if(pw.length>=6)score++;
  if(pw.length>=10)score++;
  if(/[A-Z]/.test(pw)&&/[a-z]/.test(pw))score++;
  if(/[0-9]/.test(pw))score++;
  if(/[^A-Za-z0-9]/.test(pw))score++;
  const levels=[
    {w:'20%',c:'#ef4444',t:'매우 약함'},
    {w:'40%',c:'#f97316',t:'약함'},
    {w:'60%',c:'#eab308',t:'보통'},
    {w:'80%',c:'#22c55e',t:'강함'},
    {w:'100%',c:'#16a34a',t:'매우 강함'},
  ];
  const lv=levels[Math.min(score,4)];
  bar.style.width=lv.w;bar.style.background=lv.c;
  lbl.textContent=lv.t;lbl.style.color=lv.c;
}

function showMsg(id,text){
  ['errMsg','okMsg'].forEach(i=>{
    const el=document.getElementById(i);
    el.className='msg '+(i===id?'show '+(id==='errMsg'?'err':'ok'):'');
    if(i===id)el.textContent=text;
  });
}

async function doReset(){
  const pw=document.getElementById('newPw').value;
  const pw2=document.getElementById('confirmPw').value;

  if(pw.length<6){showMsg('errMsg','비밀번호는 6자 이상이어야 합니다.');return;}
  if(pw!==pw2){showMsg('errMsg','비밀번호가 일치하지 않습니다.');return;}
  if(!_sessionReady){showMsg('errMsg','세션이 만료되었습니다. 링크를 다시 요청해주세요.');return;}

  const btn=document.getElementById('resetBtn');
  const txt=document.getElementById('resetBtnText');
  btn.disabled=true;
  txt.innerHTML='<span class="spinner"></span>변경 중...';

  const{error}=await sb.auth.updateUser({password:pw});
  if(error){
    showMsg('errMsg','오류: '+error.message);
    btn.disabled=false;txt.textContent='비밀번호 변경';
    return;
  }

  // 성공
  await sb.auth.signOut();
  document.getElementById('resetForm').style.display='none';
  document.getElementById('successBox').style.display='block';
  // URL 토큰 파라미터 제거
  window.history.replaceState({},document.title,window.location.pathname);
}

// 페이지 로드 시 토큰 검증
initResetPage();
</script>
</body>
</html>
